<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bgAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#150d2a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf620"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bgAI)"/>
  <ellipse cx="200" cy="100" rx="180" ry="90" fill="url(#glow)"/>

  <!-- Title -->
  <text x="200" y="22" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Rede Neural - Analise Preditiva</text>

  <!-- Input layer label -->
  <text x="55" y="40" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Input</text>

  <!-- Hidden layer labels -->
  <text x="155" y="40" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Camada 1</text>
  <text x="245" y="40" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Camada 2</text>

  <!-- Output layer label -->
  <text x="345" y="40" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Output</text>

  <!-- === Connections (drawn before nodes so nodes appear on top) === -->

  <!-- Input to Hidden1 connections -->
  <line x1="72" y1="65" x2="138" y2="60" stroke="#8b5cf630" stroke-width="0.8"/>
  <line x1="72" y1="65" x2="138" y2="85" stroke="#8b5cf630" stroke-width="0.8"/>
  <line x1="72" y1="65" x2="138" y2="110" stroke="#8b5cf615" stroke-width="0.8"/>
  <line x1="72" y1="65" x2="138" y2="135" stroke="#8b5cf615" stroke-width="0.8"/>

  <line x1="72" y1="95" x2="138" y2="60" stroke="#8b5cf630" stroke-width="0.8"/>
  <line x1="72" y1="95" x2="138" y2="85" stroke="#8b5cf660" stroke-width="1.2"/>
  <line x1="72" y1="95" x2="138" y2="110" stroke="#8b5cf650" stroke-width="1"/>
  <line x1="72" y1="95" x2="138" y2="135" stroke="#8b5cf620" stroke-width="0.8"/>

  <line x1="72" y1="125" x2="138" y2="60" stroke="#8b5cf615" stroke-width="0.8"/>
  <line x1="72" y1="125" x2="138" y2="85" stroke="#8b5cf630" stroke-width="0.8"/>
  <line x1="72" y1="125" x2="138" y2="110" stroke="#8b5cf660" stroke-width="1.2"/>
  <line x1="72" y1="125" x2="138" y2="135" stroke="#8b5cf640" stroke-width="1"/>

  <line x1="72" y1="155" x2="138" y2="60" stroke="#8b5cf615" stroke-width="0.8"/>
  <line x1="72" y1="155" x2="138" y2="85" stroke="#8b5cf620" stroke-width="0.8"/>
  <line x1="72" y1="155" x2="138" y2="110" stroke="#8b5cf640" stroke-width="1"/>
  <line x1="72" y1="155" x2="138" y2="135" stroke="#8b5cf660" stroke-width="1.2"/>

  <!-- Hidden1 to Hidden2 connections -->
  <line x1="172" y1="60" x2="228" y2="70" stroke="#7c3aed50" stroke-width="1"/>
  <line x1="172" y1="60" x2="228" y2="100" stroke="#7c3aed30" stroke-width="0.8"/>
  <line x1="172" y1="60" x2="228" y2="130" stroke="#7c3aed15" stroke-width="0.8"/>

  <line x1="172" y1="85" x2="228" y2="70" stroke="#7c3aed60" stroke-width="1.2"/>
  <line x1="172" y1="85" x2="228" y2="100" stroke="#7c3aed50" stroke-width="1"/>
  <line x1="172" y1="85" x2="228" y2="130" stroke="#7c3aed20" stroke-width="0.8"/>

  <line x1="172" y1="110" x2="228" y2="70" stroke="#7c3aed20" stroke-width="0.8"/>
  <line x1="172" y1="110" x2="228" y2="100" stroke="#7c3aed60" stroke-width="1.2"/>
  <line x1="172" y1="110" x2="228" y2="130" stroke="#7c3aed50" stroke-width="1"/>

  <line x1="172" y1="135" x2="228" y2="70" stroke="#7c3aed15" stroke-width="0.8"/>
  <line x1="172" y1="135" x2="228" y2="100" stroke="#7c3aed30" stroke-width="0.8"/>
  <line x1="172" y1="135" x2="228" y2="130" stroke="#7c3aed60" stroke-width="1.2"/>

  <!-- Hidden2 to Output connections -->
  <line x1="262" y1="70" x2="328" y2="85" stroke="#6d28d970" stroke-width="1.5"/>
  <line x1="262" y1="70" x2="328" y2="115" stroke="#6d28d930" stroke-width="0.8"/>
  <line x1="262" y1="100" x2="328" y2="85" stroke="#6d28d960" stroke-width="1.2"/>
  <line x1="262" y1="100" x2="328" y2="115" stroke="#6d28d960" stroke-width="1.2"/>
  <line x1="262" y1="130" x2="328" y2="85" stroke="#6d28d930" stroke-width="0.8"/>
  <line x1="262" y1="130" x2="328" y2="115" stroke="#6d28d970" stroke-width="1.5"/>

  <!-- === Input nodes === -->
  <circle cx="72" cy="65" r="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="72" y="69" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">X1</text>

  <circle cx="72" cy="95" r="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="2"/>
  <text x="72" y="99" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">X2</text>

  <circle cx="72" cy="125" r="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="72" y="129" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">X3</text>

  <circle cx="72" cy="155" r="12" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="72" y="159" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">X4</text>

  <!-- Input labels -->
  <text x="16" y="69" fill="#52525b" font-family="Arial,sans-serif" font-size="6">Preco</text>
  <text x="16" y="99" fill="#52525b" font-family="Arial,sans-serif" font-size="6">Demanda</text>
  <text x="16" y="129" fill="#52525b" font-family="Arial,sans-serif" font-size="6">Historico</text>
  <text x="16" y="159" fill="#52525b" font-family="Arial,sans-serif" font-size="6">Sazonalidade</text>

  <!-- === Hidden layer 1 === -->
  <circle cx="155" cy="60" r="12" fill="#1e1030" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="155" cy="85" r="13" fill="#1e1030" stroke="#7c3aed" stroke-width="2" filter="url(#)"/>
  <circle cx="155" cy="110" r="12" fill="#1e1030" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="155" cy="135" r="12" fill="#1e1030" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Activation glow on active nodes -->
  <circle cx="155" cy="85" r="8" fill="#7c3aed40"/>
  <circle cx="155" cy="110" r="8" fill="#7c3aed30"/>

  <!-- === Hidden layer 2 === -->
  <circle cx="245" cy="70" r="12" fill="#1e1030" stroke="#6d28d9" stroke-width="1.5"/>
  <circle cx="245" cy="100" r="13" fill="#1e1030" stroke="#6d28d9" stroke-width="2"/>
  <circle cx="245" cy="130" r="12" fill="#1e1030" stroke="#6d28d9" stroke-width="1.5"/>

  <circle cx="245" cy="100" r="8" fill="#6d28d940"/>

  <!-- === Output nodes === -->
  <circle cx="345" cy="85" r="14" fill="#2d1b4e" stroke="#a855f7" stroke-width="2"/>
  <text x="345" y="89" fill="#a855f7" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">87%</text>

  <circle cx="345" cy="115" r="14" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="345" y="119" fill="#7c3aed" font-family="Arial,sans-serif" font-size="8" text-anchor="middle" font-weight="bold">13%</text>

  <!-- Output labels -->
  <text x="367" y="89" fill="#a855f7" font-family="Arial,sans-serif" font-size="6">Comprar</text>
  <text x="367" y="119" fill="#64748b" font-family="Arial,sans-serif" font-size="6">Aguardar</text>

  <!-- Bottom metrics -->
  <rect x="12" y="172" width="376" height="20" rx="6" fill="#1e1030" stroke="#8b5cf615" stroke-width="1"/>
  <text x="30" y="185" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Acuracia:</text>
  <text x="72" y="185" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" font-weight="bold">96,4%</text>
  <text x="120" y="185" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Epocas:</text>
  <text x="155" y="185" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="7" font-weight="bold">1.200</text>
  <text x="200" y="185" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Loss:</text>
  <text x="220" y="185" fill="#ef4444" font-family="Arial,sans-serif" font-size="7" font-weight="bold">0.0038</text>
  <text x="272" y="185" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Modelo:</text>
  <text x="310" y="185" fill="#8b5cf6" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Transformer</text>
  <text x="360" y="185" fill="#64748b" font-family="Arial,sans-serif" font-size="7">GPU</text>
</svg>
