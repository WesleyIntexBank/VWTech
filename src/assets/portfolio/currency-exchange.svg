<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#grad1)"/>

  <!-- Left phone frame -->
  <rect x="20" y="8" width="158" height="184" rx="18" fill="#1c1c1f" stroke="#eab30840" stroke-width="1.5"/>
  <rect x="68" y="13" width="62" height="8" rx="4" fill="#0d1117"/>

  <!-- App header -->
  <rect x="20" y="28" width="158" height="36" fill="#eab30815"/>
  <text x="99" y="46" fill="#eab308" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CambioPro</text>
  <text x="99" y="58" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Compra e Venda de Moeda</text>

  <!-- Currency pairs -->
  <!-- USD/BRL -->
  <rect x="30" y="72" width="138" height="32" rx="8" fill="#161b22" stroke="#eab30820" stroke-width="1"/>
  <text x="40" y="84" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9" font-weight="bold">USD</text>
  <text x="40" y="96" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Dolar Americano</text>
  <text x="158" y="84" fill="#eab308" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="end">R$ 5,14</text>
  <text x="158" y="96" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="end">+0,23%</text>

  <!-- EUR/BRL -->
  <rect x="30" y="110" width="138" height="32" rx="8" fill="#161b22" stroke="#3b82f620" stroke-width="1"/>
  <text x="40" y="122" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9" font-weight="bold">EUR</text>
  <text x="40" y="134" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Euro</text>
  <text x="158" y="122" fill="#eab308" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="end">R$ 5,58</text>
  <text x="158" y="134" fill="#ef4444" font-family="Arial,sans-serif" font-size="7" text-anchor="end">-0,12%</text>

  <!-- GBP/BRL -->
  <rect x="30" y="148" width="138" height="32" rx="8" fill="#161b22" stroke="#8b5cf620" stroke-width="1"/>
  <text x="40" y="160" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="9" font-weight="bold">GBP</text>
  <text x="40" y="172" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Libra Esterlina</text>
  <text x="158" y="160" fill="#eab308" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="end">R$ 6,45</text>
  <text x="158" y="172" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="end">+0,08%</text>

  <!-- Right panel - conversion -->
  <rect x="194" y="8" width="185" height="184" rx="12" fill="#1c1c1f" stroke="#eab30825" stroke-width="1"/>

  <text x="286" y="28" fill="#94a3b8" font-family="Arial,sans-serif" font-size="9" font-weight="bold" text-anchor="middle">SIMULACAO DE CAMBIO</text>

  <!-- From -->
  <rect x="205" y="36" width="163" height="38" rx="8" fill="#161b22"/>
  <text x="215" y="50" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Voce envia</text>
  <text x="215" y="65" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="16" font-weight="bold">1.000</text>
  <text x="356" y="65" fill="#eab308" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="end">USD</text>

  <!-- Arrow -->
  <text x="286" y="92" font-family="Arial,sans-serif" font-size="16" text-anchor="middle" fill="#eab308">&#8645;</text>

  <!-- To -->
  <rect x="205" y="98" width="163" height="38" rx="8" fill="#eab30815" stroke="#eab30830" stroke-width="1"/>
  <text x="215" y="112" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Voce recebe</text>
  <text x="215" y="127" fill="#eab308" font-family="Arial,sans-serif" font-size="16" font-weight="bold">5.140,00</text>
  <text x="356" y="127" fill="#eab308" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="end">BRL</text>

  <!-- Rate info -->
  <text x="205" y="148" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Taxa: 1 USD = R$ 5,14 BRL</text>
  <text x="205" y="159" fill="#64748b" font-family="Arial,sans-serif" font-size="7">IOF: 1,1% | Spread: 0,5%</text>

  <!-- Buttons -->
  <rect x="205" y="165" width="75" height="20" rx="8" fill="#22c55e"/>
  <text x="242" y="179" fill="#fff" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle">COMPRAR</text>
  <rect x="288" y="165" width="75" height="20" rx="8" fill="#ef444425" stroke="#ef444440" stroke-width="1"/>
  <text x="325" y="179" fill="#ef4444" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle">VENDER</text>
</svg>
