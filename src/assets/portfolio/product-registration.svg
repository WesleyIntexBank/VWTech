<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0d1117"/>
  <ellipse cx="200" cy="100" rx="180" ry="85" fill="#14b8a608"/>

  <!-- Left panel - product image + variants -->
  <rect x="12" y="8" width="148" height="184" rx="10" fill="#161b22" stroke="#14b8a620" stroke-width="1"/>

  <!-- Product image placeholder -->
  <rect x="22" y="18" width="128" height="80" rx="8" fill="#1e293b"/>
  <rect x="22" y="18" width="128" height="80" rx="8" fill="#14b8a610"/>
  <!-- Box icon -->
  <polygon points="86,38 110,48 110,68 86,78 62,68 62,48" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="86" y1="38" x2="86" y2="78" stroke="#14b8a6" stroke-width="1"/>
  <line x1="62" y1="48" x2="110" y2="48" stroke="#14b8a6" stroke-width="1"/>
  <text x="86" y="96" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Foto do Produto</text>

  <!-- Upload button -->
  <rect x="38" y="100" width="96" height="14" rx="7" fill="#14b8a620" stroke="#14b8a640" stroke-width="1"/>
  <text x="86" y="110" fill="#14b8a6" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">+ Upload Imagem</text>

  <!-- Thumbnails -->
  <rect x="22" y="120" width="28" height="20" rx="4" fill="#1e293b" stroke="#14b8a630" stroke-width="1"/>
  <rect x="58" y="120" width="28" height="20" rx="4" fill="#1e293b"/>
  <rect x="94" y="120" width="28" height="20" rx="4" fill="#1e293b"/>
  <rect x="130" y="120" width="28" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="144" y="133" fill="#64748b" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">+</text>

  <!-- Status and stock quick info -->
  <text x="22" y="156" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Estoque atual:</text>
  <text x="148" y="156" fill="#14b8a6" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="end">342 un.</text>

  <text x="22" y="170" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Reservado:</text>
  <text x="148" y="170" fill="#f59e0b" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="end">18 un.</text>

  <text x="22" y="184" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Disponivel:</text>
  <text x="148" y="184" fill="#22c55e" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="end">324 un.</text>

  <!-- Right panel - form -->
  <rect x="172" y="8" width="216" height="184" rx="10" fill="#161b22" stroke="#14b8a615" stroke-width="1"/>

  <!-- Form header -->
  <rect x="172" y="8" width="216" height="28" rx="10" fill="#14b8a615"/>
  <text x="280" y="26" fill="#14b8a6" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Cadastro de Produto</text>

  <!-- Nome do produto -->
  <text x="182" y="50" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Nome do Produto</text>
  <rect x="182" y="54" width="196" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="188" y="65" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7">Monitor LED 27" Full HD</text>

  <!-- SKU e Categoria -->
  <text x="182" y="84" fill="#64748b" font-family="Arial,sans-serif" font-size="7">SKU</text>
  <rect x="182" y="88" width="88" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="188" y="99" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7">MON-27-FHD</text>

  <text x="282" y="84" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Categoria</text>
  <rect x="282" y="88" width="96" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="288" y="99" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7">Informatica</text>
  <!-- Dropdown arrow -->
  <text x="369" y="99" fill="#64748b" font-family="Arial,sans-serif" font-size="8" text-anchor="end">&#8964;</text>

  <!-- Preco e Custo -->
  <text x="182" y="118" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Preco de Venda</text>
  <rect x="182" y="122" width="88" height="16" rx="4" fill="#1e293b" stroke="#14b8a640" stroke-width="1"/>
  <text x="188" y="133" fill="#14b8a6" font-family="Arial,sans-serif" font-size="7" font-weight="bold">R$ 1.299,90</text>

  <text x="282" y="118" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Custo</text>
  <rect x="282" y="122" width="96" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="288" y="133" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7">R$ 890,00</text>

  <!-- Margem badge -->
  <text x="182" y="150" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Margem de Lucro:</text>
  <rect x="268" y="142" width="48" height="12" rx="6" fill="#22c55e25"/>
  <text x="292" y="151" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">+31,5%</text>

  <!-- Descricao -->
  <text x="182" y="166" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Descricao</text>
  <rect x="182" y="170" width="196" height="20" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="188" y="182" fill="#52525b" font-family="Arial,sans-serif" font-size="6">Monitor para producao com painel IPS...</text>

  <!-- Buttons -->
  <rect x="182" y="193" width="88" height="0" rx="6" fill="#14b8a6"/>
</svg>
