  <text x="66" y="122" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">Frango Grelhado</text>
  <text x="66" y="132" fill="#f59e0b" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">R$ 38,90</text>

  <!-- Menu item 2 -->
  <rect x="101" y="84" width="59" height="52" rx="6" fill="#1e293b"/>
  <rect x="101" y="84" width="59" height="32" rx="6" fill="#ef444430"/>
  <text x="131" y="103" font-family="Arial,sans-serif" font-size="20" text-anchor="middle">&#x1F355;</text>
  <text x="131" y="122" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">Pizza Margherita</text>
  <text x="131" y="132" fill="#f59e0b" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">R$ 54,90</text>

  <!-- Menu item 3 -->
  <rect x="36" y="142" width="59" height="38" rx="6" fill="#1e293b"/>
  <text x="65" y="158" font-family="Arial,sans-serif" font-size="14" text-anchor="middle">&#x1F969;</text>
  <text x="66" y="170" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">Picanha</text>
  <text x="66" y="178" fill="#f59e0b" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">R$ 89,90</text>

  <!-- Menu item 4 -->
  <rect x="101" y="142" width="59" height="38" rx="6" fill="#1e293b"/>
  <text x="130" y="158" font-family="Arial,sans-serif" font-size="14" text-anchor="middle">&#x1F35C;</text>
  <text x="131" y="170" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">Massa ao Molho</text>
  <text x="131" y="178" fill="#f59e0b" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">R$ 42,90</text>

  <!-- Right panel - Order summary -->
  <rect x="185" y="10" width="185" height="180" rx="12" fill="#1a1a2e" stroke="#f59e0b25" stroke-width="1"/>
  <rect x="185" y="10" width="185" height="28" rx="12" fill="#f59e0b20"/>
  <text x="277" y="28" fill="#f59e0b" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Resumo do Pedido</text>

