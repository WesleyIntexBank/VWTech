  <line x1="197" y1="62" x2="358" y2="62" stroke="#ffffff10" stroke-width="1"/>
  <text x="197" y="75" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8">2x Frango Grelhado</text>
  <text x="358" y="75" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8" text-anchor="end">R$ 77,80</text>

  <line x1="197" y1="80" x2="358" y2="80" stroke="#ffffff06" stroke-width="1"/>
  <text x="197" y="93" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8">1x Pizza Margherita</text>
  <text x="358" y="93" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8" text-anchor="end">R$ 54,90</text>

  <line x1="197" y1="98" x2="358" y2="98" stroke="#ffffff06" stroke-width="1"/>
  <text x="197" y="111" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8">2x Suco de Laranja</text>
  <text x="358" y="111" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8" text-anchor="end">R$ 22,00</text>

  <line x1="197" y1="116" x2="358" y2="116" stroke="#ffffff10" stroke-width="1"/>
  <text x="197" y="129" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Taxa de Servico (10%)</text>
  <text x="358" y="129" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8" text-anchor="end">R$ 15,47</text>

  <line x1="197" y1="134" x2="358" y2="134" stroke="#f59e0b40" stroke-width="1.5"/>
  <text x="197" y="148" fill="#f59e0b" font-family="Arial,sans-serif" font-size="10" font-weight="bold">TOTAL</text>
  <text x="358" y="148" fill="#f59e0b" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="end">R$ 170,17</text>

  <!-- Status badges -->
  <rect x="197" y="158" width="52" height="14" rx="7" fill="#22c55e25"/>
  <text x="223" y="168" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Preparando</text>
  <rect x="256" y="158" width="48" height="14" rx="7" fill="#f59e0b25"/>
  <text x="280" y="168" fill="#f59e0b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">~20 min</text>

  <!-- Pay button -->
  <rect x="197" y="178" width="155" height="0" rx="6" fill="#f59e0b"/>
</svg>
