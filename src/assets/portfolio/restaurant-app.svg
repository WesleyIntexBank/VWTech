<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0d1117"/>

  <!-- Background glow -->
  <ellipse cx="200" cy="100" rx="160" ry="90" fill="#f59e0b08"/>

  <!-- Phone frame left -->
  <rect x="30" y="10" width="140" height="180" rx="16" fill="#1a1a2e" stroke="#f59e0b40" stroke-width="1.5"/>
  <!-- Phone notch -->
  <rect x="78" y="14" width="44" height="8" rx="4" fill="#0d1117"/>

  <!-- App header -->
  <rect x="30" y="28" width="140" height="32" fill="#f59e0b"/>
  <text x="100" y="48" fill="#0d1117" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Sabor &amp; Arte</text>

  <!-- Category tabs -->
  <rect x="36" y="64" width="38" height="14" rx="7" fill="#f59e0b"/>
  <text x="55" y="74" fill="#0d1117" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">Pratos</text>
  <rect x="80" y="64" width="38" height="14" rx="7" fill="#ffffff10"/>
  <text x="99" y="74" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Bebidas</text>
  <rect x="124" y="64" width="38" height="14" rx="7" fill="#ffffff10"/>
  <text x="143" y="74" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Sobrem.</text>

  <!-- Menu item 1 -->
  <rect x="36" y="84" width="59" height="52" rx="6" fill="#1e293b"/>
  <rect x="36" y="84" width="59" height="32" rx="6" fill="#f59e0b30"/>
