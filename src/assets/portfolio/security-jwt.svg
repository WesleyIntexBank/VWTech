<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bgSec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0808"/>
    </linearGradient>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef444415"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bgSec)"/>
  <ellipse cx="200" cy="100" rx="160" ry="90" fill="url(#shieldGlow)"/>

  <!-- Title -->
  <text x="200" y="20" fill="#ef4444" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Seguranca e Controle de Acesso</text>

  <!-- Shield (center) -->
  <polygon points="200,30 230,45 230,80 200,95 170,80 170,45" fill="#1a0808" stroke="#ef4444" stroke-width="2"/>
  <!-- Lock body -->
  <rect x="190" y="64" width="20" height="14" rx="3" fill="#ef4444"/>
  <!-- Lock shackle -->
  <path d="M194,64 L194,58 Q200,52 206,58 L206,64" fill="none" stroke="#ef4444" stroke-width="2"/>
  <!-- Lock keyhole -->
  <circle cx="200" cy="70" r="3" fill="#1a0808"/>
  <rect x="199" y="70" width="2" height="4" fill="#1a0808"/>

  <!-- JWT Token visualization -->
  <rect x="12" y="30" width="148" height="80" rx="8" fill="#161b22" stroke="#ef444425" stroke-width="1"/>
  <text x="86" y="46" fill="#ef4444" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle">JWT Token</text>

  <!-- Header -->
  <rect x="20" y="52" width="132" height="16" rx="4" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
  <text x="26" y="63" fill="#f59e0b" font-family="monospace" font-size="6">eyJhbGciOiJIUzI1NiIsInR5...</text>

  <!-- Dot -->
  <text x="86" y="77" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">.</text>

  <!-- Payload -->
  <rect x="20" y="80" width="132" height="16" rx="4" fill="#8b5cf615" stroke="#8b5cf630" stroke-width="1"/>
  <text x="26" y="91" fill="#8b5cf6" font-family="monospace" font-size="6">eyJzdWIiOiIxMjM0NTYiLCJy...</text>

  <!-- Dot -->
  <text x="86" y="103" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">.</text>

  <!-- Signature -->
  <rect x="20" y="106" width="132" height="0" rx="4" fill="#22c55e15" stroke="#22c55e30" stroke-width="1"/>

  <!-- JWT parts labels -->
  <text x="20" y="76" fill="#f59e0b80" font-family="Arial,sans-serif" font-size="6">Header</text>
  <text x="20" y="100" fill="#8b5cf680" font-family="Arial,sans-serif" font-size="6">Payload</text>

  <!-- Token info -->
  <rect x="20" y="98" width="132" height="8" rx="4" fill="#22c55e15" stroke="#22c55e20" stroke-width="1"/>
  <text x="86" y="105" fill="#22c55e" font-family="monospace" font-size="5" text-anchor="middle">HMACSHA256(base64...)</text>

  <!-- Permissions / Roles -->
  <rect x="240" y="30" width="148" height="140" rx="8" fill="#161b22" stroke="#ef444425" stroke-width="1"/>
  <text x="314" y="46" fill="#ef4444" font-family="Arial,sans-serif" font-size="8" font-weight="bold" text-anchor="middle">Controle de Acesso</text>

  <!-- RBAC -->
  <text x="252" y="60" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Roles &amp; Permissoes (RBAC)</text>

  <!-- Role: Admin -->
  <rect x="252" y="64" width="128" height="22" rx="6" fill="#ef444415" stroke="#ef444430" stroke-width="1"/>
  <rect x="258" y="70" width="28" height="10" rx="5" fill="#ef4444"/>
  <text x="272" y="78" fill="#fff" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">ADMIN</text>
  <text x="296" y="78" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">READ · WRITE · DELETE</text>

  <!-- Role: Manager -->
  <rect x="252" y="90" width="128" height="22" rx="6" fill="#f59e0b15" stroke="#f59e0b30" stroke-width="1"/>
  <rect x="258" y="96" width="36" height="10" rx="5" fill="#f59e0b"/>
  <text x="276" y="104" fill="#0d1117" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">MANAGER</text>
  <text x="302" y="104" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">READ · WRITE</text>

  <!-- Role: Viewer -->
  <rect x="252" y="116" width="128" height="22" rx="6" fill="#3b82f615" stroke="#3b82f630" stroke-width="1"/>
  <rect x="258" y="122" width="32" height="10" rx="5" fill="#3b82f6"/>
  <text x="274" y="130" fill="#fff" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">VIEWER</text>
  <text x="296" y="130" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">READ ONLY</text>

  <!-- Cloud permissions -->
  <text x="252" y="152" fill="#64748b" font-family="Arial,sans-serif" font-size="7">Cloud Permissions</text>
  <rect x="252" y="156" width="36" height="10" rx="5" fill="#06b6d415"/>
  <text x="270" y="164" fill="#06b6d4" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">Azure AD</text>
  <rect x="294" y="156" width="30" height="10" rx="5" fill="#f59e0b15"/>
  <text x="309" y="164" fill="#f59e0b" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">IAM</text>
  <rect x="330" y="156" width="42" height="10" rx="5" fill="#22c55e15"/>
  <text x="351" y="164" fill="#22c55e" font-family="Arial,sans-serif" font-size="6" text-anchor="middle">OAuth 2.0</text>

  <!-- Bottom: request flow -->
  <rect x="12" y="118" width="148" height="50" rx="8" fill="#161b22" stroke="#ef444415" stroke-width="1"/>
  <text x="86" y="132" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Fluxo de Autenticacao</text>

  <text x="22" y="146" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">Cliente</text>
  <line x1="46" y1="143" x2="66" y2="143" stroke="#ef444460" stroke-width="1.5" marker-end="url(#)"/>
  <text x="56" y="141" fill="#ef4444" font-family="Arial,sans-serif" font-size="5">&#8594;</text>
  <text x="70" y="146" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">Auth</text>
  <text x="91" y="141" fill="#ef4444" font-family="Arial,sans-serif" font-size="5">&#8594;</text>
  <text x="96" y="146" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">JWT</text>
  <text x="116" y="141" fill="#ef4444" font-family="Arial,sans-serif" font-size="5">&#8594;</text>
  <text x="120" y="146" fill="#94a3b8" font-family="Arial,sans-serif" font-size="6">API</text>

  <!-- Audit log -->
  <text x="22" y="162" fill="#64748b" font-family="Arial,sans-serif" font-size="6">Auditoria: 100% das acoes logadas</text>

  <!-- 2FA badge -->
  <rect x="12" y="172" width="148" height="18" rx="6" fill="#22c55e15" stroke="#22c55e30" stroke-width="1"/>
  <text x="86" y="184" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" font-weight="bold" text-anchor="middle">2FA · MFA · SSO Habilitados</text>
</svg>
