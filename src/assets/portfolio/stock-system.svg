  <text x="330" y="21" fill="#22c55e" font-family="Arial,sans-serif" font-size="9">Atualizado</text>

  <!-- Stats row -->
  <rect x="12" y="44" width="80" height="38" rx="6" fill="#161b22" stroke="#22c55e25" stroke-width="1"/>
  <text x="52" y="60" fill="#22c55e" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1.247</text>
  <text x="52" y="73" fill="#64748b" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">Total Itens</text>

  <rect x="100" y="44" width="80" height="38" rx="6" fill="#161b22" stroke="#f59e0b25" stroke-width="1"/>
  <text x="140" y="60" fill="#f59e0b" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">18</text>
  <text x="140" y="73" fill="#64748b" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">Estoque Baixo</text>

  <rect x="188" y="44" width="80" height="38" rx="6" fill="#161b22" stroke="#ef444425" stroke-width="1"/>
  <text x="228" y="60" fill="#ef4444" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5</text>
  <text x="228" y="73" fill="#64748b" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">Esgotados</text>

  <!-- Table -->
  <rect x="12" y="92" width="256" height="98" rx="6" fill="#161b22" stroke="#ffffff0a" stroke-width="1"/>
