  <text x="22" y="170" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8">SSD 1TB NVMe</text>
  <text x="148" y="170" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">512</text>
  <text x="200" y="170" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Armazenamento</text>
  <rect x="238" y="162" width="26" height="11" rx="5" fill="#22c55e25"/>
  <text x="251" y="170" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">OK</text>

