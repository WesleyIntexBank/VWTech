  <text x="22" y="106" fill="#22c55e" font-family="Arial,sans-serif" font-size="8" font-weight="bold">PRODUTO</text>
  <text x="140" y="106" fill="#22c55e" font-family="Arial,sans-serif" font-size="8" font-weight="bold">QTDE</text>
  <text x="185" y="106" fill="#22c55e" font-family="Arial,sans-serif" font-size="8" font-weight="bold">CATEGORIA</text>
  <text x="242" y="106" fill="#22c55e" font-family="Arial,sans-serif" font-size="8" font-weight="bold">STATUS</text>

  <!-- Row 1 -->
  <text x="22" y="122" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8">Notebook Dell i5</text>
  <text x="148" y="122" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">245</text>
  <text x="200" y="122" fill="#94a3b8" font-family="Arial,sans-serif" font-size="8">Informatica</text>
  <rect x="238" y="114" width="26" height="11" rx="5" fill="#22c55e25"/>
  <text x="251" y="122" fill="#22c55e" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">OK</text>

