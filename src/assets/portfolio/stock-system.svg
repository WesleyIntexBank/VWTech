  <rect x="280" y="92" width="108" height="98" rx="6" fill="#161b22" stroke="#ffffff0a" stroke-width="1"/>
  <text x="334" y="108" fill="#64748b" font-family="Arial,sans-serif" font-size="8" text-anchor="middle">Estoque/Categoria</text>

  <!-- Bars (bottom at y=178, max height=60) -->
  <rect x="293" y="128" width="16" height="50" rx="2" fill="#22c55e" opacity="0.85"/>
  <rect x="316" y="138" width="16" height="40" rx="2" fill="#3b82f6" opacity="0.85"/>
  <rect x="339" y="118" width="16" height="60" rx="2" fill="#f59e0b" opacity="0.85"/>
  <rect x="362" y="148" width="16" height="30" rx="2" fill="#8b5cf6" opacity="0.85"/>

  <!-- Bar labels -->
  <text x="301" y="188" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Info</text>
  <text x="324" y="188" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Peri</text>
  <text x="347" y="188" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Alim</text>
  <text x="370" y="188" fill="#64748b" font-family="Arial,sans-serif" font-size="7" text-anchor="middle">Out</text>
